
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>calculator</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
   <div id="box">
<div id="screen">0</div>

    <button  class="symbol">AC</button> 
    <button class="symbol">C</button>
    <button class="button">%</button>
    <button  class="button"style="background-color: rgb(189, 223, 86,0.5)">/</button>
    <button class="num">7</button>
    <button class="num">8</button>
    <button class="num">9</button>
    <button class="button" style="background-color: rgb(189, 223, 86,0.5)">X</button>
    <button class="num">4</button>
    <button class="num">5</button>
    <button class="num">6</button>
    <button class="button" style="background-color: rgb(189, 223, 86,0.5)">-</button>
    <button class="num">1</button>
    <button class="num">2</button>
    <button class="num">3</button>
    <button class="button" style="background-color: rgb(189, 223, 86,0.5)">+</button>
    <button  id="button" class="symbol">__</button>
    <button class="num">0</button>
    <button class="button">.</button>
    <button  class="symbol" style="background-color: rgb(189, 223, 86,0.5)">=</button>
</div>
    
    <script src="project.js"></script>
</body>
</html>
